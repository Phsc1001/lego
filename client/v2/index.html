<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Insights | Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 0.875rem;
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08);
            --ease: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Full-height shell — only .deals-column scrolls */
        html, body {
            height: 100%; overflow: hidden;
            font-family: "Plus Jakarta Sans", sans-serif;
            background: var(--bg); color: var(--text-main);
        }
        .page-shell { display: flex; flex-direction: column; height: 100vh; }

        /* ── Navbar ── */
        .navbar {
            flex-shrink: 0; background: white;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm); z-index: 100;
        }
        .nav-container {
            max-width: 1500px; margin: 0 auto;
            padding: 0.875rem 2rem;
            display: flex; align-items: center; gap: 1.5rem;
        }
        .logo { display: flex; align-items: center; gap: 0.625rem; text-decoration: none; flex-shrink: 0; }
        .logo-icon {
            width: 38px; height: 38px; background: var(--primary);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem; box-shadow: 0 4px 8px rgba(79,70,229,.35);
        }
        .logo-text { font-weight: 800; font-size: 1.125rem; color: var(--text-main); letter-spacing: -.02em; }
        .logo-text span { color: var(--primary); }
        .search-bar { flex: 1; max-width: 560px; position: relative; }
        .search-bar i {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: .875rem; pointer-events: none;
        }
        .search-input {
            width: 100%; padding: .6875rem 1rem .6875rem 2.75rem;
            border-radius: var(--radius); border: 1.5px solid var(--border);
            background: var(--bg); font-size: .9rem; font-family: inherit;
            color: var(--text-main); transition: var(--ease);
        }
        .search-input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 3px var(--primary-light); }
        .search-input::placeholder { color: #94a3b8; }
        .nav-stats { display: flex; gap: 1rem; flex-shrink: 0; align-items: center; }
        .nav-stat { display: flex; flex-direction: column; align-items: flex-end; }
        .nav-stat-value { font-weight: 800; font-size: 1.125rem; line-height: 1; }
        .nav-stat-value.primary { color: var(--primary); }
        .nav-stat-label { font-size: .625rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
        .nav-divider { width: 1px; height: 28px; background: var(--border); }

        /* ── Toolbar ── */
        .toolbar {
            flex-shrink: 0; background: white;
            border-bottom: 1px solid var(--border); z-index: 99;
        }
        .tool-container {
            max-width: 1500px; margin: 0 auto;
            padding: .625rem 2rem;
            display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
        }
        .filter-btn {
            padding: .4375rem .875rem; border-radius: 2rem;
            border: 1.5px solid var(--border); background: white;
            color: var(--text-muted); font-weight: 600; font-size: .8rem;
            font-family: inherit; cursor: pointer; transition: var(--ease);
            display: flex; align-items: center; gap: .375rem; white-space: nowrap;
        }
        .filter-btn i { font-size: .7rem; }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,70,229,.35); }
        .toolbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 .25rem; }
        .sort-select {
            padding: .4375rem .875rem; border-radius: 2rem;
            border: 1.5px solid var(--border); background: white;
            font-weight: 600; font-size: .8rem; font-family: inherit;
            cursor: pointer; color: var(--text-main); transition: var(--ease);
        }
        .sort-select:focus { outline: none; border-color: var(--primary); }

        /* ── Main layout ── */
        .main-container {
            flex: 1; min-height: 0;
            max-width: 1500px; width: 100%; margin: 0 auto;
            display: grid; grid-template-columns: 1fr 290px; overflow: hidden;
        }
        @media (max-width: 1100px) { .main-container { grid-template-columns: 1fr; } .sidebar { display: none; } }

        /* Only this column scrolls */
        .deals-column {
            overflow-y: auto;
            padding: 1.5rem 1.25rem 1.5rem 2rem;
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .deals-column::-webkit-scrollbar { width: 5px; }
        .deals-column::-webkit-scrollbar-track { background: transparent; }
        .deals-column::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        #deals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); gap: 1.125rem; }

        /* ── Deal Cards ── */
        .deal-card {
            background: white; border-radius: var(--radius); overflow: hidden;
            border: 1.5px solid var(--border); transition: var(--ease);
            display: flex; flex-direction: column; cursor: pointer;
        }
        .deal-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: #c7d2fe; }
        .deal-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .image-box {
            position: relative; height: 195px; background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; border-bottom: 1px solid #f1f5f9;
        }
        .image-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .discount-tag {
            position: absolute; top: .625rem; left: .625rem;
            background: var(--danger); color: white;
            padding: .25rem .5rem; border-radius: .375rem;
            font-weight: 800; font-size: .7rem;
        }
        .fav-btn {
            position: absolute; top: .625rem; right: .625rem;
            width: 30px; height: 30px; border-radius: 50%;
            background: white; border: none; box-shadow: var(--shadow-sm);
            cursor: pointer; transition: var(--ease);
            display: flex; align-items: center; justify-content: center;
            color: #cbd5e1; font-size: .8125rem;
        }
        .fav-btn:hover { transform: scale(1.15); color: var(--accent); }
        .fav-btn.is-fav { color: var(--accent); }
        .card-body { padding: .875rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-ref { font-size: .6rem; font-weight: 800; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: .2rem; }
        .card-title {
            font-size: .9rem; font-weight: 700; color: var(--text-main);
            line-height: 1.4; height: 2.52rem; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            margin-bottom: .75rem;
        }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: .625rem; border-top: 1px solid #f1f5f9; }
        .price-value { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
        .card-stats { display: flex; gap: .625rem; color: var(--text-muted); font-size: .7125rem; font-weight: 700; }
        .stat-item { display: flex; align-items: center; gap: .2rem; }
        .stat-item.hot { color: var(--danger); }

        /* Pagination inside scrollable column */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 1.25rem; padding: .75rem 0 .25rem; }
        .pag-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: 1.5px solid var(--border); background: white;
            cursor: pointer; transition: var(--ease);
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem; color: var(--text-main); box-shadow: var(--shadow-sm);
        }
        .pag-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .pag-btn:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
        .pag-info { text-align: center; }
        .pag-range { font-size: .7rem; color: var(--text-muted); font-weight: 600; }
        .pag-pages { font-weight: 800; font-size: .875rem; color: var(--text-main); }

        /* ── Sidebar — stays fixed while deals scroll ── */
        .sidebar {
            border-left: 1px solid var(--border); background: white;
            overflow-y: auto; padding: 1.25rem;
            display: flex; flex-direction: column;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
        .market-section-title {
            font-size: .7rem; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .07em;
            display: flex; align-items: center; gap: .4rem; margin-bottom: .875rem;
        }
        .market-section-title i { color: var(--primary); }
        .selected-set-box {
            background: var(--primary-light); border: 1.5px solid #c7d2fe;
            border-radius: var(--radius); padding: .75rem 1rem;
            text-align: center; margin-bottom: .75rem;
        }
        .selected-set-label { font-size: .575rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: .08em; display: block; }
        #selected-set-id { font-size: 1.125rem; font-weight: 800; color: var(--primary); display: block; margin-top: 2px; }
        #market-loading { text-align: center; padding: .625rem; color: var(--primary); font-size: .8rem; font-weight: 600; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: .625rem; padding: .6rem .5rem; text-align: center; }
        .stat-box-label { font-size: .55rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 2px; }
        .stat-box-value { font-size: .9375rem; font-weight: 800; color: var(--text-main); }
        .stat-box-value.primary { color: var(--primary); }
        .stat-box-value.success { color: var(--success); }
    </style>
</head>
<body>
<div class="page-shell">

    <!-- Anchored navbar: logo + search always visible -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <div class="logo-icon"><i class="fas fa-cubes"></i></div>
                <span class="logo-text">LEGO <span>Insights</span></span>
            </a>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="search-input" placeholder="Search by name or set ID&hellip;">
            </div>
            <div class="nav-stats">
                <div class="nav-stat">
                    <span id="items-count" class="nav-stat-value primary">0</span>
                    <span class="nav-stat-label">Matches</span>
                </div>
                <div class="nav-divider"></div>
                <div class="nav-stat">
                    <span id="total-scraped" class="nav-stat-value">0</span>
                    <span class="nav-stat-label">Total Deals</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Anchored toolbar: filters always visible below navbar -->
    <div class="toolbar">
        <div class="tool-container">
            <button class="filter-btn" id="filter-discount"><i class="fas fa-percent"></i> Big Deals</button>
            <button class="filter-btn" id="filter-commented"><i class="fas fa-comments"></i> Popular</button>
            <button class="filter-btn" id="filter-hot"><i class="fas fa-fire"></i> Hot</button>
            <button class="filter-btn" id="filter-favorites"><i class="fas fa-heart"></i> Favorites</button>
            <div class="toolbar-divider"></div>
            <select class="sort-select" id="sort-select">
                <option value="">Default Sort</option>
                <option value="price-asc">Price &uarr;</option>
                <option value="price-desc">Price &darr;</option>
                <option value="date-asc">Newest</option>
                <option value="date-desc">Oldest</option>
            </select>
            <select class="sort-select" id="show-select">
                <option value="6">6 / page</option>
                <option value="12">12 / page</option>
                <option value="24">24 / page</option>
            </select>
        </div>
    </div>

    <!-- Main: only .deals-column scrolls; sidebar is anchored -->
    <div class="main-container">

        <div class="deals-column">
            <div id="deals-grid"></div>
            <div class="pagination">
                <button class="pag-btn" id="prev-btn" disabled><i class="fas fa-chevron-left"></i></button>
                <div class="pag-info">
                    <div id="pag-range" class="pag-range">Showing 0&ndash;0 of 0</div>
                    <div class="pag-pages">Page <span id="current-page">1</span> of <span id="total-pages">1</span></div>
                </div>
                <button class="pag-btn" id="next-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- Anchored Market Intelligence panel -->
        <aside class="sidebar">
            <div class="market-section-title">
                <i class="fas fa-chart-line"></i> Market Intelligence
            </div>
            <div class="selected-set-box">
                <span class="selected-set-label">Selected Set</span>
                <span id="selected-set-id">None</span>
            </div>
            <div id="market-loading" style="display:none;">
                <i class="fas fa-circle-notch fa-spin"></i> Analyzing&hellip;
            </div>
            <div id="market-stats" class="stats-grid">
                <div class="stat-box" style="grid-column:1/-1">
                    <span class="stat-box-label">Vinted Listings</span>
                    <span id="nbSales" class="stat-box-value primary">&mdash;</span>
                </div>
                <div class="stat-box">
                    <span class="stat-box-label">P5</span>
                    <span id="p5Price" class="stat-box-value">&mdash;</span>
                </div>
                <div class="stat-box">
                    <span class="stat-box-label">P25</span>
                    <span id="p25Price" class="stat-box-value">&mdash;</span>
                </div>
                <div class="stat-box" style="grid-column:1/-1">
                    <span class="stat-box-label">Median (P50)</span>
                    <span id="p50Price" class="stat-box-value success">&mdash;</span>
                </div>
                <div class="stat-box" style="grid-column:1/-1">
                    <span class="stat-box-label">Market Velocity</span>
                    <span id="ltvPrice" class="stat-box-value">&mdash;</span>
                </div>
            </div>
        </aside>
    </div>

</div>
<script src="utils.js"></script>
<script src="portfolio.js"></script>
</body>
</html>
