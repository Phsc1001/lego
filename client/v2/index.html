<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?? LEGO Insights | Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #eef2ff;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius-lg: 1.25rem;
            --radius-md: 0.75rem;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.5; }

        /* Navigation & Search */
        .navbar {
            background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;
            padding: 1rem 0; box-shadow: var(--shadow-sm);
        }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
        .logo { display: flex; align-items: center; gap: 0.75rem; color: var(--primary); font-weight: 800; font-size: 1.5rem; text-decoration: none; min-width: max-content; }
        
        .search-bar { flex-grow: 1; max-width: 600px; position: relative; }
        .search-bar i { position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input {
            width: 100%; padding: 0.875rem 1rem 0.875rem 3rem; border-radius: var(--radius-md); border: 2px solid #f1f5f9;
            background: #f8fafc; font-size: 1rem; transition: var(--transition);
        }
        .search-input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-light); }

        /* Filter Toolbar */
        .toolbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 0; }
        .tool-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
        
        .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-btn {
            padding: 0.625rem 1.25rem; border-radius: var(--radius-md); border: 2px solid #f1f5f9;
            background: white; color: var(--text-muted); font-weight: 600; font-size: 0.875rem; cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; gap: 0.5rem;
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        
        .divider { width: 2px; height: 24px; background: #e2e8f0; margin: 0 0.5rem; }
        
        .sort-select { padding: 0.625rem 2.5rem 0.625rem 1rem; border-radius: var(--radius-md); border: 2px solid #f1f5f9; background: white; font-weight: 600; cursor: pointer; color: var(--text-main); }

        /* Main Content Grid */
        .main-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 350px; gap: 2.5rem; }
        @media (max-width: 1100px) { .main-container { grid-template-columns: 1fr; } }

        #deals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }

        .deal-card {
            background: white; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid #e2e8f0;
            transition: var(--transition); display: flex; flex-direction: column; cursor: pointer; position: relative;
        }
        .deal-card:hover { transform: translateY(-8px); box-shadow: var(--shadow); border-color: var(--primary-light); }
        .deal-card.selected { border: 2px solid var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

        .image-box { position: relative; height: 280px; background: white; padding: 1.5rem; display: flex; align-items: center; justify-content: center; }
        .image-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .discount-tag { position: absolute; top: 1.25rem; left: 1.25rem; background: var(--danger); color: white; padding: 0.5rem 0.75rem; border-radius: 0.75rem; font-weight: 800; font-size: 0.875rem; }
        .fav-btn {
            position: absolute; top: 1.25rem; right: 1.25rem; width: 44px; height: 44px; border-radius: 50%;
            background: white; border: none; box-shadow: var(--shadow); cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 1.25rem;
        }
        .fav-btn:hover { transform: scale(1.1); color: var(--accent); }
        .fav-btn.is-fav { color: var(--accent); }

        .card-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-ref { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 0.5rem; text-transform: uppercase; }
        .card-title { font-size: 1.125rem; font-weight: 700; color: var(--text-main); margin-bottom: 1.5rem; line-height: 1.5; height: 3.3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; border-top: 1px solid #f1f5f9; padding-top: 1.25rem; }
        .card-price { display: flex; flex-direction: column; }
        .price-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); }
        .price-value { font-size: 1.75rem; font-weight: 800; color: var(--primary); }

        .card-stats { display: flex; gap: 1rem; color: var(--text-muted); font-size: 0.875rem; font-weight: 700; }
        .stat-item { display: flex; align-items: center; gap: 0.35rem; }
        .stat-item.hot { color: var(--danger); }

        /* Market Sidebar */
        .sidebar { position: sticky; top: 6rem; height: max-content; }
        .market-card { background: white; border-radius: var(--radius-lg); padding: 2rem; border: 1px solid #e2e8f0; box-shadow: var(--shadow-sm); }
        .market-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        
        .stats-list { display: grid; gap: 1rem; }
        .stat-row { background: #f8fafc; padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; }
        .row-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
        .row-value { font-size: 1.5rem; font-weight: 800; color: var(--text-main); }
        .row-value.blue { color: var(--primary); }

        /* Pagination Area */
        .pagination { max-width: 1400px; margin: 3rem auto; padding: 0 2rem; display: flex; align-items: center; justify-content: center; gap: 2rem; }
        .pag-btn {
            width: 56px; height: 56px; border-radius: 50%; border: 2px solid #e2e8f0; background: white;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; color: var(--text-main);
        }
        .pag-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .pag-info { font-weight: 800; font-size: 1.125rem; color: var(--text-muted); }

    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo"><i class="fas fa-cubes"></i> LEGO INSIGHTS</a>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="search-input" placeholder="Search by name or set ID (e.g. 75333)...">
            </div>
            <div style="min-width: 100px; text-align: right;">
                <span id="items-count" style="font-weight: 800; color: var(--primary);">0</span>
                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); display: block;">DEALS FOUND</span>
            </div>
        </div>
    </nav>

    <div class="toolbar">
        <div class="tool-container">
            <div class="filter-group">
                <button class="filter-btn" id="filter-discount"><i class="fas fa-percent"></i> Big Deals</button>
                <button class="filter-btn" id="filter-commented"><i class="fas fa-comments"></i> Popular</button>
                <button class="filter-btn" id="filter-hot"><i class="fas fa-fire"></i> Hot Deals</button>
                <button class="filter-btn" id="filter-favorites"><i class="fas fa-heart"></i> Favorites</button>
            </div>
            <div class="divider"></div>
            <div class="filter-group">
                <select class="sort-select" id="sort-select">
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="date-asc">Recent First</option>
                    <option value="date-desc">Oldest First</option>
                </select>
                <select class="sort-select" id="show-select">
                    <option value="6">Show 6</option>
                    <option value="12">Show 12</option>
                    <option value="24">Show 24</option>
                </select>
            </div>
        </div>
    </div>

    <main class="main-container">
        <section id="deals-grid"></section>
        
        <aside class="sidebar">
            <div class="market-card">
                <h2><i class="fas fa-chart-line"></i> Market Intelligence</h2>
                <div id="market-loading" style="display:none; text-align:center; padding: 2rem; color: var(--primary); font-weight: 700;">
                    <i class="fas fa-circle-notch fa-spin"></i> Analyzing...
                </div>
                <div id="market-stats" class="stats-list">
                    <div class="stat-row">
                        <span class="row-label">Selected Set</span>
                        <span id="selected-set-id" class="row-value blue">None</span>
                    </div>
                    <div class="stat-row">
                        <span class="row-label">Vinted Items</span>
                        <span id="nbSales" class="row-value">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="row-label">P5 Price</span>
                        <span id="p5Price" class="row-value">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="row-label">P25 Price</span>
                        <span id="p25Price" class="row-value">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="row-label">Median (P50)</span>
                        <span id="p50Price" class="row-value">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="row-label">Market Velocity</span>
                        <span id="ltvPrice" class="row-value">-</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <div class="pagination">
        <button class="pag-btn" id="prev-btn" disabled><i class="fas fa-chevron-left"></i></button>
        <span class="pag-info">Page <span id="current-page">1</span> of <span id="total-pages">1</span></span>
        <button class="pag-btn" id="next-btn"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script src="utils.js"></script>
    <script src="portfolio.js"></script>
</body>
</html>
