<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Insights Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">
            <i class="fas fa-layer-group"></i>
            LEGO<span>Insights</span>
        </a>
        <div class="search-wrapper">
            <select id="lego-id-select" class="id-select">
                <option value="">Search by LEGO Set ID...</option>
            </select>
        </div>
        <div class="nav-metrics">
            <div class="stat-group" style="text-align: right;">
                <span id="total-count" class="metric-value" style="color: var(--primary); font-size: 1.25rem; font-weight: 800;">0</span>
                <span class="metric-label" style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Total Deals</span>
            </div>
        </div>
    </nav>

    <div class="app-container">
        
        <main class="main-content">
            <header class="toolbar">
                <div class="filter-group">
                    <button class="btn" id="filter-discount"><i class="fas fa-tags"></i> 50%+ Off</button>
                    <button class="btn" id="filter-commented"><i class="fas fa-comment-dots"></i> Popular</button>
                    <button class="btn" id="filter-hot"><i class="fas fa-fire"></i> Hot Deals</button>
                    <button class="btn" id="filter-favorites"><i class="fas fa-heart"></i> Saved</button>
                </div>
                
                <div class="filter-group">
                    <select class="select-control" id="sort-select">
                        <option value="">Sort: Default</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                        <option value="date-desc">Date: Newest First</option>
                        <option value="date-asc">Date: Oldest First</option>
                    </select>
                    <select class="select-control" id="show-select">
                        <option value="6">6 / page</option>
                        <option value="12" selected>12 / page</option>
                        <option value="24">24 / page</option>
                    </select>
                </div>
            </header>

            <div class="deals-grid-container scrollable">
                <div id="deals-grid" class="deals-grid">
                    <!-- Cards -->
                </div>

                <footer class="pagination">
                    <button class="btn" id="prev-btn" disabled><i class="fas fa-chevron-left"></i></button>
                    <div class="page-info">Page <span id="current-page">1</span> of <span id="total-pages">1</span></div>
                    <button class="btn" id="next-btn"><i class="fas fa-chevron-right"></i></button>
                </footer>
            </div>
        </main>

        <aside class="sidebar">
            <div class="section-header">
                <i class="fas fa-chart-line"></i>
                <h2 style="font-size: 1rem; font-weight: 800; text-transform: uppercase;">Market Intelligence</h2>
            </div>

            <div class="intel-card">
                <div class="selected-set">
                    <span class="set-label">Active Analysis</span>
                    <span id="selected-set-id" class="set-id">#----</span>
                </div>

                <div id="market-loading" style="display:none; text-align: center; padding: 1rem;">
                    <i class="fas fa-spinner fa-spin"></i> Analyzing...
                </div>

                <div id="market-stats" class="metrics-grid">
                    <div class="metric-box full">
                        <span class="metric-label">Resale Listings</span>
                        <span id="nbSales" class="metric-value">0</span>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">P5 Price</span>
                        <span id="p5Price" class="metric-value">-</span>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">P25 Price</span>
                        <span id="p25Price" class="metric-value">-</span>
                    </div>
                    <div class="metric-box full">
                        <span class="metric-label">Median (P50)</span>
                        <span id="p50Price" class="metric-value success">-</span>
                    </div>
                    <div class="metric-box full">
                        <span class="metric-label">Market Velocity</span>
                        <span id="ltvPrice" class="metric-value">-</span>
                    </div>
                    <div class="metric-box full" style="border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.25rem;">
                        <span class="metric-label">Deal Price</span>
                        <span id="dealPrice" class="metric-value">-</span>
                    </div>
                    <div class="metric-box full">
                        <span class="metric-label">Profit Potential</span>
                        <span id="profitPotential" class="metric-value">-</span>
                    </div>
                </div>
            </div>
            <div id="related-section" style="margin-top: 1.25rem; display: none;">
                <div class="section-header" style="margin-bottom: 0.75rem;">
                    <i class="fas fa-layer-group"></i>
                    <h2 style="font-size: 0.9rem; font-weight: 700; text-transform: uppercase; margin: 0;">Other Deals for This Set</h2>
                </div>
                <div id="related-deals"></div>
            </div>
        </aside>

    </div>

    <script src="utils.js"></script>
    <script src="portfolio.js"></script>
</body>
</html>
